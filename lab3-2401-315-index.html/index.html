<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录注册系统 - 密码/验证码登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
        }

        .welcome-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 50px 60px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        .welcome-card h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 32px;
        }

        .welcome-card p {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .user-info {
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 10px;
            display: none;
        }

        .user-info.show {
            display: block;
        }

        .logout-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 10px;
        }

        /* 对话框 */
        .dialog-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .dialog-overlay.show {
            display: flex;
        }

        .login-dialog {
            position: relative;
            width: 460px;
            max-width: 90%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: dialogFadeIn 0.3s ease;
        }

        @keyframes dialogFadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .dialog-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            transition: color 0.2s;
            z-index: 10;
        }

        .dialog-close:hover {
            color: #ff6b6b;
        }

        /* 头部logo */
        .dialog-header {
            text-align: center;
            padding: 30px 30px 10px;
        }

        .dialog-header h2 {
            color: #333;
            font-size: 24px;
        }

        .dialog-header p {
            color: #999;
            font-size: 13px;
            margin-top: 5px;
        }

        /* 登录方式切换 */
        .login-tabs {
            display: flex;
            margin: 0 30px;
            border-bottom: 2px solid #eee;
        }

        .login-tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: #999;
            transition: all 0.2s;
            border: none;
            background: none;
        }

        .login-tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        /* 表单区域 */
        .form-container {
            padding: 25px 30px 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        /* 验证码行 */
        .captcha-row {
            display: flex;
            gap: 10px;
        }

        .captcha-row input {
            flex: 1;
        }

        .get-captcha-btn {
            background: #f0f0f0;
            border: 1px solid #ddd;
            padding: 0 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .get-captcha-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .get-captcha-btn.disabled {
            background: #ccc;
            cursor: not-allowed;
            color: #666;
        }

        /* 协议勾选 */
        .agreement {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .agreement input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .agreement label {
            font-size: 13px;
            color: #666;
            cursor: pointer;
        }

        .agreement a {
            color: #667eea;
            text-decoration: none;
        }

        .agreement a:hover {
            text-decoration: underline;
        }

        /* 登录按钮 */
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        /* 额外选项行 */
        .extra-links {
            display: flex;
            justify-content: space-between;
            margin: 15px 0 20px;
            font-size: 13px;
        }

        .extra-links a {
            color: #667eea;
            text-decoration: none;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }

        /* 第三方登录 - 图片图标 */
        .social-login {
            text-align: center;
            padding: 20px 30px 30px;
            border-top: 1px solid #eee;
        }

        .social-login p {
            color: #999;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .social-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .social-icon:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .social-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 5px;
            display: block;
        }

        /* 协议弹窗 */
        .agreement-dialog {
            width: 500px;
            max-width: 90%;
            background: white;
            border-radius: 20px;
            position: relative;
        }

        .agreement-content {
            padding: 20px 30px;
            max-height: 400px;
            overflow-y: auto;
        }

        .agreement-content p {
            line-height: 1.8;
            color: #555;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="welcome-card">
        <h1>📚 智慧书屋</h1>
        <p>让阅读成为习惯，让书香浸润人生</p>
        <button class="btn-login" id="showLoginBtn">登录 / 注册</button>
        
        <div class="user-info" id="userInfoArea">
            <p>✅ 当前登录用户：<strong id="currentUsername"></strong></p>
            <button class="logout-btn" id="logoutBtn">退出登录</button>
        </div>
    </div>
</div>

<!-- 登录对话框 -->
<div class="dialog-overlay" id="dialogOverlay">
    <div class="login-dialog">
        <div class="dialog-close" id="closeDialogBtn">&times;</div>
        
        <div class="dialog-header">
            <h2>欢迎回来</h2>
            <p>登录后享受更多精彩内容</p>
        </div>

        <!-- 登录方式切换 -->
        <div class="login-tabs">
            <button class="login-tab active" data-type="password">密码登录</button>
            <button class="login-tab" data-type="captcha">验证码登录</button>
        </div>

        <div class="form-container">
            <!-- 密码登录表单 -->
            <div id="passwordForm">
                <div class="form-group">
                    <label>手机号 / 用户名</label>
                    <input type="text" id="loginAccount" placeholder="请输入用户名/手机号" autocomplete="off">
                    <span class="error-msg" id="accountError"></span>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码">
                    <span class="error-msg" id="passwordError"></span>
                </div>
            </div>

            <!-- 验证码登录表单（默认隐藏） -->
            <div id="captchaForm" style="display: none;">
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" id="phoneNumber" placeholder="请输入手机号" autocomplete="off">
                    <span class="error-msg" id="phoneError"></span>
                </div>
                <div class="form-group">
                    <label>验证码</label>
                    <div class="captcha-row">
                        <input type="text" id="smsCode" placeholder="请输入验证码">
                        <button class="get-captcha-btn" id="getCaptchaBtn">获取验证码</button>
                    </div>
                    <span class="error-msg" id="codeError"></span>
                </div>
            </div>

            <!-- 用户协议 -->
            <div class="agreement">
                <input type="checkbox" id="agreeCheckbox">
                <label for="agreeCheckbox">我已阅读并同意 <a href="#" id="showAgreement">《用户协议》</a> 和 <a href="#" id="showPrivacy">《隐私政策》</a></label>
            </div>

            <!-- 登录按钮 -->
            <button class="login-btn" id="doLoginBtn">登 录</button>

            <!-- 立即注册 + 忘记密码 -->
            <div class="extra-links">
                <a href="#" id="registerLink">立即注册</a>
                <a href="#" id="forgotPwdLink">忘记密码？</a>
            </div>
        </div>

        <!-- 第三方登录 - 图片图标 -->
        <div class="social-login">
            <p>其他登录方式</p>
            <div class="social-icons">
                <!-- 微信图标 -->
                <div class="social-icon wechat" data-type="wechat">
                    <img src="1.jpg" alt="微信" onerror="this.src='https://picsum.photos/id/1/44/44'">
                </div>
                <!-- QQ图标 -->
                <div class="social-icon qq" data-type="qq">
                    <img src="2.jpg" alt="QQ" onerror="this.src='https://picsum.photos/id/2/44/44'">
                </div>
                <!-- 微博图标 -->
                <div class="social-icon weibo" data-type="weibo">
                    <img src="3.jpg" alt="微博" onerror="this.src='https://picsum.photos/id/3/44/44'">
                </div>
                <!-- 支付宝图标 -->
                <div class="social-icon alipay" data-type="alipay">
                    <img src="4.jpg" alt="支付宝" onerror="this.src='https://picsum.photos/id/4/44/44'">
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 协议内容弹窗 -->
<div class="dialog-overlay" id="agreementOverlay" style="z-index: 1100;">
    <div class="agreement-dialog">
        <div class="dialog-close" id="closeAgreementBtn">&times;</div>
        <div class="dialog-header">
            <h2>用户协议</h2>
        </div>
        <div class="agreement-content">
            <p>欢迎您使用智慧书屋服务！</p>
            <p>1. 服务条款的接受<br>通过访问或使用本网站，表示您同意受本协议条款的约束。</p>
            <p>2. 用户账号<br>用户需提供真实有效的信息注册账号，并对账号安全负责。</p>
            <p>3. 用户行为规范<br>不得利用本服务进行任何违法或侵权行为。</p>
            <p>4. 隐私保护<br>我们重视用户隐私，详情请查看隐私政策。</p>
            <p>5. 协议修改<br>我们保留随时修改本协议的权利。</p>
            <p style="text-align: center; color: #999; margin-top: 20px;">—— 感谢您的支持 ——</p>
        </div>
    </div>
</div>

<script>
    // ========== 本地存储操作 ==========
    function initUsers() {
        let users = localStorage.getItem("bookstore_users");
        if (!users) {
            const defaultUsers = [
                { username: "zhangsan", phone: "13800138001", password: "123456" },
                { username: "lisi", phone: "13800138002", password: "123456" }
            ];
            localStorage.setItem("bookstore_users", JSON.stringify(defaultUsers));
        }
    }
    
    function getUsers() {
        return JSON.parse(localStorage.getItem("bookstore_users")) || [];
    }
    
    function saveUsers(users) {
        localStorage.setItem("bookstore_users", JSON.stringify(users));
    }
    
    function isUsernameExist(username) {
        return getUsers().some(u => u.username === username);
    }
    
    function isPhoneExist(phone) {
        return getUsers().some(u => u.phone === phone);
    }
    
    function registerUser(username, password, phone) {
        if (isUsernameExist(username)) return { success: false, msg: "用户名已存在" };
        if (isPhoneExist(phone)) return { success: false, msg: "手机号已注册" };
        const users = getUsers();
        users.push({ username, password, phone });
        saveUsers(users);
        return { success: true, msg: "注册成功" };
    }
    
    function validateLogin(account, password) {
        const users = getUsers();
        const user = users.find(u => (u.username === account || u.phone === account) && u.password === password);
        if (user) return { success: true, msg: "登录成功", user };
        return { success: false, msg: "账号或密码错误" };
    }
    
    function validateCaptchaLogin(phone, code) {
        if (!phone) return { success: false, msg: "请输入手机号" };
        if (code !== "123456") return { success: false, msg: "验证码错误" };
        const users = getUsers();
        const user = users.find(u => u.phone === phone);
        if (user) return { success: true, msg: "登录成功", user };
        return { success: false, msg: "该手机号未注册，请先注册" };
    }
    
    function setCurrentUser(username) {
        if (username) localStorage.setItem("currentUser", username);
        else localStorage.removeItem("currentUser");
    }
    
    function getCurrentUser() {
        return localStorage.getItem("currentUser");
    }
    
    function updateUI() {
        const currentUser = getCurrentUser();
        const userInfoArea = document.getElementById("userInfoArea");
        const currentUsernameSpan = document.getElementById("currentUsername");
        const showLoginBtn = document.getElementById("showLoginBtn");
        if (currentUser) {
            userInfoArea.classList.add("show");
            currentUsernameSpan.textContent = currentUser;
            showLoginBtn.textContent = "切换账号";
        } else {
            userInfoArea.classList.remove("show");
            showLoginBtn.textContent = "登录 / 注册";
        }
    }
    
    // 全局变量
    let currentLoginType = "password";
    let captchaTimer = null;
    
    function clearErrors() {
        document.querySelectorAll(".error-msg").forEach(el => el.textContent = "");
    }
    
    function switchLoginType(type) {
        currentLoginType = type;
        const passwordForm = document.getElementById("passwordForm");
        const captchaForm = document.getElementById("captchaForm");
        const tabs = document.querySelectorAll(".login-tab");
        
        if (type === "password") {
            passwordForm.style.display = "block";
            captchaForm.style.display = "none";
            tabs[0].classList.add("active");
            tabs[1].classList.remove("active");
        } else {
            passwordForm.style.display = "none";
            captchaForm.style.display = "block";
            tabs[0].classList.remove("active");
            tabs[1].classList.add("active");
        }
        clearErrors();
    }
    
    function startCaptchaCountdown(btn) {
        let seconds = 60;
        btn.disabled = true;
        btn.classList.add("disabled");
        captchaTimer = setInterval(() => {
            seconds--;
            if (seconds <= 0) {
                clearInterval(captchaTimer);
                btn.disabled = false;
                btn.classList.remove("disabled");
                btn.textContent = "获取验证码";
            } else {
                btn.textContent = `${seconds}秒后重试`;
            }
        }, 1000);
    }
    
    function sendCaptcha() {
        const phone = document.getElementById("phoneNumber").value.trim();
        const phoneError = document.getElementById("phoneError");
        const btn = document.getElementById("getCaptchaBtn");
        
        if (btn.disabled) return;
        if (!phone) {
            phoneError.textContent = "请输入手机号";
            return;
        }
        if (!/^1[3-9]\d{9}$/.test(phone)) {
            phoneError.textContent = "请输入正确的手机号";
            return;
        }
        phoneError.textContent = "";
        
        alert(`验证码已发送至 ${phone}，演示验证码为：123456`);
        startCaptchaCountdown(btn);
    }
    
    function isAgreeChecked() {
        return document.getElementById("agreeCheckbox").checked;
    }
    
    function handlePasswordLogin() {
        if (!isAgreeChecked()) {
            alert("请先阅读并同意用户协议");
            return;
        }
        
        const account = document.getElementById("loginAccount").value.trim();
        const password = document.getElementById("loginPassword").value;
        let hasError = false;
        
        document.getElementById("accountError").textContent = "";
        document.getElementById("passwordError").textContent = "";
        
        if (!account) {
            document.getElementById("accountError").textContent = "请输入用户名/手机号";
            hasError = true;
        }
        if (!password) {
            document.getElementById("passwordError").textContent = "请输入密码";
            hasError = true;
        }
        if (hasError) return;
        
        const result = validateLogin(account, password);
        if (result.success) {
            setCurrentUser(result.user.username);
            updateUI();
            document.getElementById("dialogOverlay").classList.remove("show");
            document.getElementById("loginAccount").value = "";
            document.getElementById("loginPassword").value = "";
            clearErrors();
            alert(`登录成功！欢迎 ${result.user.username}`);
        } else {
            document.getElementById("passwordError").textContent = result.msg;
        }
    }
    
    function handleCaptchaLogin() {
        if (!isAgreeChecked()) {
            alert("请先阅读并同意用户协议");
            return;
        }
        
        const phone = document.getElementById("phoneNumber").value.trim();
        const code = document.getElementById("smsCode").value.trim();
        
        document.getElementById("phoneError").textContent = "";
        document.getElementById("codeError").textContent = "";
        
        let hasError = false;
        if (!phone) {
            document.getElementById("phoneError").textContent = "请输入手机号";
            hasError = true;
        } else if (!/^1[3-9]\d{9}$/.test(phone)) {
            document.getElementById("phoneError").textContent = "请输入正确的手机号";
            hasError = true;
        }
        if (!code) {
            document.getElementById("codeError").textContent = "请输入验证码";
            hasError = true;
        }
        if (hasError) return;
        
        const result = validateCaptchaLogin(phone, code);
        if (result.success) {
            setCurrentUser(result.user.username);
            updateUI();
            document.getElementById("dialogOverlay").classList.remove("show");
            document.getElementById("phoneNumber").value = "";
            document.getElementById("smsCode").value = "";
            clearErrors();
            alert(`登录成功！欢迎 ${result.user.username}`);
        } else {
            document.getElementById("codeError").textContent = result.msg;
        }
    }
    
    function handleLogin() {
        if (currentLoginType === "password") {
            handlePasswordLogin();
        } else {
            handleCaptchaLogin();
        }
    }
    
    function showRegister() {
        alert("注册功能：\n演示账号可直接使用\n用户名/手机号/密码注册\n演示环境暂未开放独立注册页，您可使用测试账号：zhangsan / 123456\n或联系管理员");
    }
    
    function showForgotPwd() {
        alert("忘记密码？\n请联系客服重置密码\n客服热线：400-888-1234");
    }
    
    function socialLogin(type) {
        let name = "";
        switch(type) {
            case "wechat": name = "微信"; break;
            case "qq": name = "QQ"; break;
            case "weibo": name = "微博"; break;
            case "alipay": name = "支付宝"; break;
        }
        alert(`您正在使用${name}登录，演示模式下暂未接入，实际可对接OAuth接口`);
    }
    
    function showDialog() {
        document.getElementById("loginAccount").value = "";
        document.getElementById("loginPassword").value = "";
        document.getElementById("phoneNumber").value = "";
        document.getElementById("smsCode").value = "";
        document.getElementById("agreeCheckbox").checked = false;
        clearErrors();
        switchLoginType("password");
        document.getElementById("dialogOverlay").classList.add("show");
    }
    
    function hideDialog() {
        document.getElementById("dialogOverlay").classList.remove("show");
    }
    
    function showAgreement() {
        document.getElementById("agreementOverlay").classList.add("show");
    }
    
    function hideAgreement() {
        document.getElementById("agreementOverlay").classList.remove("show");
    }
    
    function initEventListeners() {
        document.getElementById("showLoginBtn").addEventListener("click", showDialog);
        document.getElementById("closeDialogBtn").addEventListener("click", hideDialog);
        document.getElementById("dialogOverlay").addEventListener("click", function(e) {
            if (e.target === this) hideDialog();
        });
        
        document.querySelectorAll(".login-tab").forEach(btn => {
            btn.addEventListener("click", function() {
                switchLoginType(this.getAttribute("data-type"));
            });
        });
        
        document.getElementById("getCaptchaBtn").addEventListener("click", sendCaptcha);
        document.getElementById("doLoginBtn").addEventListener("click", handleLogin);
        
        document.getElementById("registerLink").addEventListener("click", function(e) {
            e.preventDefault();
            showRegister();
        });
        
        document.getElementById("forgotPwdLink").addEventListener("click", function(e) {
            e.preventDefault();
            showForgotPwd();
        });
        
        document.querySelectorAll(".social-icon").forEach(icon => {
            icon.addEventListener("click", function() {
                socialLogin(this.getAttribute("data-type"));
            });
        });
        
        document.getElementById("showAgreement").addEventListener("click", function(e) {
            e.preventDefault();
            showAgreement();
        });
        document.getElementById("showPrivacy").addEventListener("click", function(e) {
            e.preventDefault();
            showAgreement();
        });
        document.getElementById("closeAgreementBtn").addEventListener("click", hideAgreement);
        document.getElementById("agreementOverlay").addEventListener("click", function(e) {
            if (e.target === this) hideAgreement();
        });
        
        document.getElementById("logoutBtn").addEventListener("click", function() {
            setCurrentUser(null);
            updateUI();
            alert("已退出登录");
        });
        
        document.getElementById("loginPassword").addEventListener("keypress", function(e) {
            if (e.key === "Enter" && currentLoginType === "password") handleLogin();
        });
        document.getElementById("smsCode").addEventListener("keypress", function(e) {
            if (e.key === "Enter" && currentLoginType === "captcha") handleLogin();
        });
    }
    
    initUsers();
    updateUI();
    initEventListeners();
</script>
</body>
</html>
